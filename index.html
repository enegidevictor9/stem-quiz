<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Questions Quiz - 60 Questions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>STEM Questions Quiz</h1>
        <p class="subtitle">Click on any question to answer it (60 Questions)</p>
        
        <div class="score-display">
            <span>Score: <strong id="scoreCount">0</strong>/60</span>
            <button class="reset-btn" onclick="resetQuiz()">Reset All</button>
        </div>
        
        <div class="questions-grid" id="questionsGrid">
            <!-- Questions will be generated here by JavaScript -->
        </div>
    </div>

    <!-- Modal for displaying questions and answers -->
    <div id="questionModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeQuestion()">&times;</span>
            <h2 id="modalQuestion"></h2>
            <div class="options-container" id="optionsContainer"></div>
            <button class="submit-btn" onclick="submitAnswer()">Submit Answer</button>
            <div id="resultMessage" class="result-message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
