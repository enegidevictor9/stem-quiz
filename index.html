<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Quiz - 60 Questions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <h1>🧪 STEM Quiz</h1>
            <p class="tagline">Test Your Science, Technology, Engineering & Math Knowledge</p>
        </header>

        <!-- Score Section -->
        <div class="score-section">
            <div class="score-info">
                <div class="score-card">
                    <span class="score-label">Total</span>
                    <span class="score-value" id="totalScore">0</span>
                </div>
                <div class="score-card">
                    <span class="score-label">Answered</span>
                    <span class="score-value" id="answeredScore">0</span>
                </div>
                <div class="score-card">
                    <span class="score-label">Remaining</span>
                    <span class="score-value" id="remainingScore">60</span>
                </div>
            </div>
            <button class="btn-reset" onclick="resetAllAnswers()">🔄 Reset Quiz</button>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <button class="filter-btn active" onclick="setFilter('all')">All Questions</button>
            <button class="filter-btn" onclick="setFilter('unanswered')">Unanswered</button>
            <button class="filter-btn" onclick="setFilter('answered')">Answered</button>
        </div>

        <!-- Questions Section -->
        <div class="questions-section" id="questionsSection">
            <!-- Accordions will be generated here -->
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-label">Quiz Progress</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
